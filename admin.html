<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registro de Ventas - Dumplings</title>
	<style>
		body {
			background: linear-gradient(135deg, #ffb347 0%, #ff7043 100%);
			min-height: 100vh;
			margin: 0;
			font-family: 'Segoe UI', Arial, sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.container {
			background: #fff;
			padding: 2rem 1.5rem;
			border-radius: 1.5rem;
			box-shadow: 0 4px 24px rgba(255, 112, 67, 0.15);
			width: 100%;
			max-width: 400px;
		}
		h1 {
			color: #e64a19;
			text-align: center;
			margin-bottom: 1rem;
			font-size: 1.6rem;
			letter-spacing: 1px;
		}
		.tabs {
			display: flex;
			gap: 0.5rem;
			margin-bottom: 1.2rem;
		}
		.tab-btn {
			flex: 1;
			padding: 0.75rem;
			border: 1px solid #ffb347;
			background: #fff7f0;
			color: #e64a19;
			font-weight: 600;
			border-radius: 0.8rem;
			cursor: pointer;
			transition: all 0.2s;
		}
		.tab-btn.active {
			background: linear-gradient(90deg, #ff7043 60%, #ffb347 100%);
			color: #fff;
			border-color: #ff7043;
		}
		label {
			display: block;
			margin-bottom: 0.5rem;
			color: #ff7043;
			font-weight: 500;
		}
		input, select {
			width: 100%;
			padding: 0.7rem;
			margin-bottom: 1.2rem;
			border: 1px solid #ffb347;
			border-radius: 0.8rem;
			background: #fff7f0;
			font-size: 1rem;
			box-shadow: 0 2px 8px rgba(255, 112, 67, 0.07);
			transition: border-color 0.2s;
		}
		input:focus, select:focus {
			border-color: #e64a19;
			outline: none;
		}
		.btn {
			width: 100%;
			padding: 1rem;
			background: linear-gradient(90deg, #ff7043 60%, #ffb347 100%);
			color: #fff;
			font-size: 1.2rem;
			font-weight: bold;
			border: none;
			border-radius: 1rem;
			box-shadow: 0 4px 16px rgba(255, 112, 67, 0.18);
			cursor: pointer;
			margin-top: 0.5rem;
			transition: background 0.2s, transform 0.1s;
		}
		.btn:hover {
			background: linear-gradient(90deg, #e64a19 60%, #ffb347 100%);
			transform: scale(1.03);
		}
		.hidden {
			display: none;
		}
		@media (max-width: 500px) {
			.container {
				padding: 1rem 0.5rem;
				border-radius: 1rem;
			}
			h1 {
				font-size: 1.2rem;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Registro de Ventas - Dumplings</h1>
		<div class="tabs">
			<button type="button" class="tab-btn active" id="tabVenta">Registrar Venta</button>
			<button type="button" class="tab-btn" id="tabGasto">Registrar Gasto</button>
		</div>

		<form id="ventaForm" autocomplete="off">
			<input type="hidden" name="tipoFormulario" value="venta">
			<label for="cliente">Nombre del Cliente (Opcional)</label>
			<input type="text" id="cliente" name="cliente" placeholder="Ej: Juan Pérez">

			<div style="display: flex; gap: 1rem; margin-bottom: 1.2rem;">
				<div style="flex: 1;">
					<label for="cant6" style="font-size: 0.85rem;">Paq. 6pz</label>
					<input type="number" id="cant6" name="cant6" min="0" value="0" style="margin-bottom: 0; padding: 0.7rem 0.4rem; text-align: center;">
				</div>
				<div style="flex: 1;">
					<label for="cant8" style="font-size: 0.85rem;">Paq. 8pz</label>
					<input type="number" id="cant8" name="cant8" min="0" value="0" style="margin-bottom: 0; padding: 0.7rem 0.4rem; text-align: center;">
				</div>
				<div style="flex: 1;">
					<label for="cant12" style="font-size: 0.85rem;">Paq. 12pz</label>
					<input type="number" id="cant12" name="cant12" min="0" value="0" style="margin-bottom: 0; padding: 0.7rem 0.4rem; text-align: center;">
				</div>
			</div>

			<div style="display: flex; gap: 1rem; margin-bottom: 1.2rem;">
				<div style="flex: 1;">
					<label for="piezasExtra" style="font-size: 0.85rem;">Pz. Extra ($20)</label>
					<input type="number" id="piezasExtra" name="piezasExtra" min="0" value="0" style="margin-bottom: 0; padding: 0.7rem 0.4rem; text-align: center;">
				</div>
				<div style="flex: 1;">
					<label for="salsasExtra" style="font-size: 0.85rem;">Salsas Extra ($15)</label>
					<input type="number" id="salsasExtra" name="salsasExtra" min="0" value="0" style="margin-bottom: 0; padding: 0.7rem 0.4rem; text-align: center;">
				</div>
			</div>

			<label for="entrega">Tipo de Entrega</label>
			<select id="entrega" name="entrega" required>
				<option value="">Selecciona...</option>
				<option value="A domicilio">A domicilio</option>
				<option value="Pasar a recoger">Pasar a recoger</option>
			</select>

			<div id="direccionGroup" class="hidden">
				<label for="direccion">Dirección de entrega</label>
				<input type="text" id="direccion" name="direccion">
			</div>

			<label for="pago">Método de Pago</label>
			<select id="pago" name="pago" required>
				<option value="">Selecciona...</option>
				<option value="Efectivo">Efectivo</option>
				<option value="Transferencia">Transferencia</option>
			</select>

			<label for="costoEnvio">Costo de Envío ($)</label>
			<input type="number" id="costoEnvio" name="costoEnvio" value="0" min="0" step="0.01">

			<button type="submit" class="btn">Registrar Venta</button>
		</form>

		<form id="gastoForm" autocomplete="off" class="hidden">
			<input type="hidden" name="tipoFormulario" value="gasto">

			<label for="concepto">Concepto</label>
			<select id="concepto" name="concepto" required>
				<option value="">Selecciona...</option>
				<option value="Harina">Harina</option>
				<option value="Carne">Carne</option>
				<option value="Verduras">Verduras</option>
				<option value="Empaques">Empaques</option>
				<option value="Gas">Gas</option>
				<option value="Otro">Otro</option>
			</select>

			<div id="conceptoOtroGroup" class="hidden">
				<label for="conceptoOtro">Especificar concepto</label>
				<input type="text" id="conceptoOtro" name="conceptoOtro">
			</div>

			<label for="monto">Monto</label>
			<input type="number" id="monto" name="monto" required placeholder="Ej. 250" min="0" step="0.01">

			<label for="pagoGasto">Método de pago</label>
			<select id="pagoGasto" name="pagoGasto" required>
				<option value="">Selecciona...</option>
				<option value="Efectivo">Efectivo</option>
				<option value="Transferencia">Transferencia</option>
			</select>

			<button type="submit" class="btn">Registrar Gasto</button>
		</form>
	</div>
	<script>
		const scriptURL = 'https://script.google.com/macros/s/AKfycbw5bKXZwCLtNJ94yZXnFKshp_eDW3AD9MP5j-bvLgafhFTJEUFap8hw_Ffgt-dQXW_J1g/exec';
		const tabVenta = document.getElementById('tabVenta');
		const tabGasto = document.getElementById('tabGasto');
		const ventaForm = document.getElementById('ventaForm');
		const gastoForm = document.getElementById('gastoForm');
		const entregaSelect = document.getElementById('entrega');
		const direccionGroup = document.getElementById('direccionGroup');
		const direccionInput = document.getElementById('direccion');
		const conceptoSelect = document.getElementById('concepto');
		const conceptoOtroGroup = document.getElementById('conceptoOtroGroup');
		const conceptoOtroInput = document.getElementById('conceptoOtro');
		const formFields = document.querySelectorAll('input, select');

		// 1. Función para cambiar entre Ventas y Gastos
		function activarTab(tipo) {
			if (tipo === 'venta') {
				tabVenta.classList.add('active');
				tabGasto.classList.remove('active');
				ventaForm.classList.remove('hidden');
				gastoForm.classList.add('hidden');
			} else {
				tabGasto.classList.add('active');
				tabVenta.classList.remove('active');
				gastoForm.classList.remove('hidden');
				ventaForm.classList.add('hidden');
			}
		}

		// 2. Función para mostrar/ocultar la dirección
		function toggleDireccionGroup() {
			const esDomicilio = entregaSelect.value === 'A domicilio';
			if (esDomicilio) {
				direccionGroup.classList.remove('hidden');
			} else {
				direccionGroup.classList.add('hidden');
				direccionInput.value = '';
			}
		}

		function toggleConceptoOtroGroup() {
			const esOtro = conceptoSelect.value === 'Otro';
			if (esOtro) {
				conceptoOtroGroup.classList.remove('hidden');
				conceptoOtroInput.required = true;
			} else {
				conceptoOtroGroup.classList.add('hidden');
				conceptoOtroInput.required = false;
				conceptoOtroInput.value = '';
			}
		}

		// 3. Función para mandar los datos a Google Sheets
		function enviarFormulario(formulario, textoBotonOriginal, alertaExito) {
			const btn = formulario.querySelector('.btn');
			btn.innerHTML = 'Registrando... 🥟';
			btn.disabled = true;

			const formData = new FormData(formulario);
			if (formulario.id === 'gastoForm' && formData.get('concepto') === 'Otro') {
				formData.set('concepto', formData.get('conceptoOtro'));
			}

			fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
				.then(() => {
					alert(alertaExito);
					localStorage.clear();
					formulario.reset();
					btn.innerHTML = textoBotonOriginal;
					btn.disabled = false;
					if (formulario.id === 'ventaForm') {
						toggleDireccionGroup(); // Oculta la dirección al limpiar
					} else if (formulario.id === 'gastoForm') {
						toggleConceptoOtroGroup(); // Oculta el campo extra al limpiar
					}
				})
				.catch(error => {
					console.error('Error!', error.message);
					alert('Hubo un error al registrar. Intenta de nuevo.');
					btn.innerHTML = textoBotonOriginal;
					btn.disabled = false;
				});
		}

		function saveFieldValue(event) {
			const target = event.target;
			if (!target.id) return;
			localStorage.setItem(target.id, target.value);
		}

		function restoreFormData() {
			formFields.forEach(field => {
				if (!field.id) return;
				const saved = localStorage.getItem(field.id);
				if (saved !== null) {
					field.value = saved;
				}
			});
			toggleDireccionGroup();
			toggleConceptoOtroGroup();
		}

		// 4. Conectar los botones con las funciones
		tabVenta.addEventListener('click', () => activarTab('venta'));
		tabGasto.addEventListener('click', () => activarTab('gasto'));
		entregaSelect.addEventListener('change', toggleDireccionGroup);
		conceptoSelect.addEventListener('change', toggleConceptoOtroGroup);
		formFields.forEach(field => {
			field.addEventListener('input', saveFieldValue);
			field.addEventListener('change', saveFieldValue);
		});

		ventaForm.addEventListener('submit', e => {
			e.preventDefault();
			enviarFormulario(ventaForm, 'Registrar Venta', '¡Venta registrada con éxito!');
		});

		gastoForm.addEventListener('submit', e => {
			e.preventDefault();
			enviarFormulario(gastoForm, 'Registrar Gasto', '¡Gasto registrado con éxito!');
		});

	restoreFormData();
	</script>
</body>
</html>
