<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registro de Ventas - Dumplings</title>
	<style>
		body {
			background: linear-gradient(135deg, #ffb347 0%, #ff7043 100%);
			min-height: 100vh;
			margin: 0;
			font-family: 'Segoe UI', Arial, sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.container {
			background: #fff;
			padding: 2rem 1.5rem;
			border-radius: 1.5rem;
			box-shadow: 0 4px 24px rgba(255, 112, 67, 0.15);
			width: 100%;
			max-width: 400px;
		}
		h1 {
			color: #e64a19;
			text-align: center;
			margin-bottom: 2rem;
			font-size: 1.6rem;
			letter-spacing: 1px;
		}
		label {
			display: block;
			margin-bottom: 0.5rem;
			color: #ff7043;
			font-weight: 500;
		}
		input, select {
			width: 100%;
			padding: 0.7rem;
			margin-bottom: 1.2rem;
			border: 1px solid #ffb347;
			border-radius: 0.8rem;
			background: #fff7f0;
			font-size: 1rem;
			box-shadow: 0 2px 8px rgba(255, 112, 67, 0.07);
			transition: border-color 0.2s;
		}
		input:focus, select:focus {
			border-color: #e64a19;
			outline: none;
		}
		.btn {
			width: 100%;
			padding: 1rem;
			background: linear-gradient(90deg, #ff7043 60%, #ffb347 100%);
			color: #fff;
			font-size: 1.2rem;
			font-weight: bold;
			border: none;
			border-radius: 1rem;
			box-shadow: 0 4px 16px rgba(255, 112, 67, 0.18);
			cursor: pointer;
			margin-top: 0.5rem;
			transition: background 0.2s, transform 0.1s;
		}
		.btn:hover {
			background: linear-gradient(90deg, #e64a19 60%, #ffb347 100%);
			transform: scale(1.03);
		}
		@media (max-width: 500px) {
			.container {
				padding: 1rem 0.5rem;
				border-radius: 1rem;
			}
			h1 {
				font-size: 1.2rem;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Registro de Ventas - Dumplings</h1>
		<form id="ventaForm" autocomplete="off">
			<label for="cliente">Nombre del Cliente</label>
			<input type="text" id="cliente" name="cliente" required placeholder="Ej: Juan Pérez">

			<label for="paquete">Paquete</label>
			<select id="paquete" name="paquete" required>
				<option value="">Selecciona...</option>
				<option value="6 piezas">6 piezas</option>
				<option value="8 piezas">8 piezas</option>
				<option value="12 piezas">12 piezas</option>
			</select>

			<label for="entrega">Tipo de Entrega</label>
			<select id="entrega" name="entrega" required>
				<option value="">Selecciona...</option>
				<option value="A domicilio">A domicilio</option>
				<option value="Recoger en casa">Recoger en casa</option>
			</select>

			<label for="pago">Método de Pago</label>
			<select id="pago" name="pago" required>
				<option value="">Selecciona...</option>
				<option value="Efectivo">Efectivo</option>
				<option value="Transferencia">Transferencia</option>
			</select>

			<button type="submit" class="btn">Registrar Venta</button>
		</form>
	</div>
	<script>
		// Pega tu URL de Google Apps Script entre las comillas de abajo:
		const scriptURL = 'https://script.google.com/macros/s/AKfycbwmsaSBhW5qDXM5AZ_-jDMTdDSi7CeXPitDT7KCxEh_5V6Zexyf_ixBPqeaaeZT_z0hew/exec';
		const form = document.getElementById('ventaForm');
		const btn = document.querySelector('.btn');

		form.addEventListener('submit', e => {
			e.preventDefault();
			// Cambiamos el texto del botón para que sepa que está cargando
			btn.innerHTML = 'Registrando... 🥟';
			btn.disabled = true;

			let formData = new FormData(form);

			fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
				.then(response => {
					alert('¡Venta registrada con éxito!');
					form.reset();
					btn.innerHTML = 'Registrar Venta';
					btn.disabled = false;
				})
				.catch(error => {
					console.error('Error!', error.message);
					alert('Hubo un error al registrar la venta. Intenta de nuevo.');
					btn.innerHTML = 'Registrar Venta';
					btn.disabled = false;
				});
		});
	</script>
</body>
</html>
